{% extends 'crops/base.html' %}
{% block title %}Register - FarmPrice{% endblock %}

{% block content %}
<section style="min-height: 80vh; display: flex; align-items: center; background: linear-gradient(135deg, #f8fffe, #e8f5e9);">
    <div class="container" style="max-width: 450px;">
        <div class="card" style="padding: 2.5rem;">
            <div style="text-align: center; margin-bottom: 2rem;">
                <div style="font-size: 3rem; margin-bottom: 0.5rem;">🌾</div>
                <h1 style="font-family: 'Syne', sans-serif; font-size: 1.8rem; font-weight: 800;">Join FarmPrice</h1>
                <p style="color: #6c757d;">Create your free farmer account today</p>
            </div>
            
            <form method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" required placeholder="Choose a username">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" required placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" required placeholder="Min 8 characters">
                </div>
                <button type="submit" class="btn btn-gold" style="width: 100%; padding: 0.9rem; font-size: 1.05rem;">Create Account →</button>
            </form>
            
            <div style="text-align: center; margin-top: 1.5rem; color: #6c757d;">
                Already have an account? <a href="/login/" style="color: #2d6a4f; font-weight: 700;">Login</a>
            </div>
        </div>
    </div>
</section>
{% endblock %}
