{% extends 'crops/base.html' %}
{% block title %}Login - FarmPrice{% endblock %}

{% block content %}
<section style="min-height: 80vh; display: flex; align-items: center; background: linear-gradient(135deg, #f8fffe, #e8f5e9);">
    <div class="container" style="max-width: 450px;">
        <div class="card" style="padding: 2.5rem;">
            <div style="text-align: center; margin-bottom: 2rem;">
                <div style="font-size: 3rem; margin-bottom: 0.5rem;">🌾</div>
                <h1 style="font-family: 'Syne', sans-serif; font-size: 1.8rem; font-weight: 800;">Welcome Back</h1>
                <p style="color: #6c757d;">Sign in to your FarmPrice account</p>
            </div>
            
            <form method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" required placeholder="Your username">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" required placeholder="Your password">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.9rem;">Login →</button>
            </form>
            
            <div style="text-align: center; margin-top: 1.5rem; color: #6c757d;">
                Don't have an account? <a href="/register/" style="color: #2d6a4f; font-weight: 700;">Register Free</a>
            </div>
        </div>
    </div>
</section>
{% endblock %}
